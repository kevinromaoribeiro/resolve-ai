# RESOLVE AI — infraestrutura enxuta (Whapi.Cloud)
# Agora a mensageria é o Whapi (nuvem), então NÃO subimos mais Evolution
# nem Postgres localmente. Só o bot FastAPI. Libera RAM na VPS.
# Comando:  docker compose up -d --build
services:
  bot:
    build: .
    container_name: resolveai-bot
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # --- Whapi.Cloud (mensageria) ---
      - WHAPI_TOKEN=${WHAPI_TOKEN}
      - WHAPI_URL=${WHAPI_URL:-https://gate.whapi.cloud}
      # --- App ---
      - ADMIN_PHONE=${ADMIN_PHONE}
      - MASTER_PHONE=${MASTER_PHONE}
      - TRIAL_DAYS=${TRIAL_DAYS:-7}
      - AUDIO_MAX_SECONDS=${AUDIO_MAX_SECONDS:-120}
      - TERMS_URL=${TERMS_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PAYMENT_LINK=${PAYMENT_LINK}
      - PAYMENT_LINK_ANUAL=${PAYMENT_LINK_ANUAL}
      - DB_PATH=/app/data/resolve_ai.db
    volumes:
      - ./data:/app/data
    command: uvicorn wa_bot:app --host 0.0.0.0 --port 8000
