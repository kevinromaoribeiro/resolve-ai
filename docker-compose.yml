# RESOLVE AI — infraestrutura local de custo zero
# Sobe a Evolution API (WhatsApp via QR Code) + o bot FastAPI.
# Requisito: Docker Desktop instalado (gratuito).
# Comando:  docker compose up -d
services:
  evolution:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: resolveai-evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - AUTHENTICATION_API_KEY=${EVOLUTION_APIKEY:-troque-esta-chave}
      - SERVER_URL=${SERVER_URL:-http://localhost:8080}
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evo:evo@postgres:5432/evolution
      - CACHE_REDIS_ENABLED=false
      - CACHE_LOCAL_ENABLED=true
      - QRCODE_LIMIT=30
      - QRCODE_COLOR=#00A86B
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_URL=http://bot:8000/webhook
      - WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS=false
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
      - WEBHOOK_BASE64=true            # mídia chega em base64 no webhook
    depends_on:
      - postgres
    volumes:
      - evolution_instances:/evolution/instances

  postgres:
    image: postgres:16-alpine
    container_name: resolveai-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=evo
      - POSTGRES_PASSWORD=evo
      - POSTGRES_DB=evolution
    volumes:
      - pg_data:/var/lib/postgresql/data

  bot:
    build: .
    container_name: resolveai-bot
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - EVOLUTION_URL=http://evolution:8080
      - EVOLUTION_APIKEY=${EVOLUTION_APIKEY}
      - EVOLUTION_INSTANCE=${EVOLUTION_INSTANCE}
      - SERVER_URL=${SERVER_URL}
      - ADMIN_PHONE=${ADMIN_PHONE}
      - TRIAL_DAYS=${TRIAL_DAYS:-7}
      - AUDIO_MAX_SECONDS=${AUDIO_MAX_SECONDS:-120}
      - TERMS_URL=${TERMS_URL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PAYMENT_LINK=${PAYMENT_LINK}
      - PAYMENT_LINK_ANUAL=${PAYMENT_LINK_ANUAL}
      - DB_PATH=/app/data/resolve_ai.db
    volumes:
      - ./data:/app/data
    command: uvicorn wa_bot:app --host 0.0.0.0 --port 8000

volumes:
  evolution_instances:
  pg_data:
